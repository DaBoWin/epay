# Nginx for Epay (PHP-FPM in same container)
user  www-data;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        # Avoid absolute redirects that drop the external (Docker-mapped) port.
        # Use relative redirects so the browser keeps the current host:port.
        absolute_redirect off;
        port_in_redirect on;

        # Route payment and API front controllers explicitly.
        location ^~ /pay/ {
            rewrite ^/pay/(.*)$ /pay.php?s=$1 last;
        }
        location ^~ /api/ {
            rewrite ^/api/(.*)$ /api.php?s=$1 last;
        }

        # Ensure directory URLs keep trailing slash without losing port.
        location = /admin { return 308 /admin/; }
        location = /user  { return 308 /user/; }

        # Block installer and upgrader in containerized/production deployments.
        location ^~ /install/ {
            return 403;
        }
        location = /install {
            return 403;
        }

        root /var/www/html;
        index index.php index.html;

        client_max_body_size 20m;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_index index.php;
            fastcgi_pass 127.0.0.1:9000;
        }

        location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff|woff2|ttf|eot)$ {
            expires 7d;
            access_log off;
        }

        location ~ /\. {
            deny all;
        }
    }
}
